spring:
  application:
    name: timer_backend
  profiles:
    default: dev
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    driver-class-name: org.postgresql.Driver

jwt:
  expiration: 3000000
  secret: secretsecretsecretsecretsecretsecret

app:
  rate-limit:
    enabled: true
