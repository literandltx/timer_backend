databaseChangeLog:
  - changeSet:
      id: 05-create-timer-options-table
      author: your-name
      changes:
        - createTable:
            tableName: timer_options
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_timer_options_user_id
                    references: users(id)
              - column:
                  name: timer_value
                  type: BIGINT
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: timer_options
            columnNames: user_id, timer_value
            constraintName: uk_timer_options_user_id_value
