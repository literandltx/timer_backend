databaseChangeLog:
  - changeSet:
      id: 07-create-timer-entries-table
      author: your-name
      changes:
        - createTable:
            tableName: timer_entries
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_timer_entries_user_id
                    references: users(id)
              - column:
                  name: label_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_timer_entries_label_id
                    references: labels(id)
              - column:
                  name: duration_seconds
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: start_time
                  type: BIGINT
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: timer_entries
            columnNames: user_id, start_time
            constraintName: uc_timerentry_user_starttime