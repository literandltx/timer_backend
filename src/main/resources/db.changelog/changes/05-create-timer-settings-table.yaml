databaseChangeLog:
  - changeSet:
      id: 06-create-timer-settings-table
      author: your-name
      changes:
        - createTable:
            tableName: timer_settings
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_timer_settings_user_id
                    references: users(id)
              - column:
                  name: active_option_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_timer_settings_option_id
                    references: timer_options(id)
              - column:
                  name: last_updated
                  type: BIGINT
                  constraints:
                    nullable: false
